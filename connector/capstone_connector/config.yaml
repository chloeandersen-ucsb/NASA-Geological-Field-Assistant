device:
  adapter: hci0
  advertised_name: GeoFieldAssistant-01
  require_pairing: true

classifier:
  mode: subprocess
  # You MUST provide weights and an image path (latest capture). Easiest: maintain ML-classifications/latest.jpg.
  subprocess_cmd: ["python3","-u","capstone_connector/wrappers/classify_from_rocknet.py","--weights","<CAPSTONE_ROOT>/ML-classifications/best_rocknet.pt","--image","<CAPSTONE_ROOT>/ML-classifications/latest.jpg"]

transcriber:
  mode: subprocess
  subprocess_cmd: ["python3","-u","capstone_connector/wrappers/v2t_from_improved2.py"]

runtime:
  asr_idle_timeout_s: 60
  asr_hard_cap_min: 15
  notify_rate_hz: 15
